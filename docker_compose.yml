version: '3'


services:
  mongodb: 
    image: mongo
    ports:
    - "27013:27017"
    environment:
        - MONGO_INITDB_ROOT_USERNAME=admin                     
        - MONGO_INITDB_ROOT_PASSWORD=password123
  volumes:
  - my-datain-mongo:/data/db
  mongo-express:
    image: mongo-express
    restart: always
    ports:
    - "8082:8081"
    environment:
      - ME_CONFIG_MONGODB_SERVER=mongodb
      - ME_CONFIG_MONGODB_ADMINUSERNAME=admin
      - ME_CONFIG_MONGODB_ADMINPASSWORD=password123
volumes:
  my-datain-mongo: 
    driver: local